<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Морзе Мастер</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #121212;
            color: white;
        }
        .container {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #2b2b2b;
            border: 1px solid #444;
            color: #ffcc00;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .output {
            font-size: 1.4rem;
            letter-spacing: 4px;
            color: #00ff88;
            min-height: 60px;
            margin: 15px 0;
            word-wrap: break-word;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-size: 1.1rem;
        }
        .btn-play { background: #007bff; color: white; grid-column: span 2; }
        .btn-play:hover { background: #0056b3; }
        .btn-manual { background: #444; color: white; font-size: 2rem; }
        .btn-manual:active { background: #ffcc00; color: #000; }
        
        .hint { font-size: 0.8rem; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Морзе-Декодер</h2>
    
    <input type="text" id="textInput" placeholder="Введите текст..." oninput="translate()">
    <div id="output" class="output"></div>

    <button class="btn-play" onclick="playFullSequence()">▶ Прослушать всё</button>

    <div class="controls">
        <button class="btn-manual" onmousedown="startTone()" onmouseup="stopTone()" onmouseleave="stopTone()">•</button>
        <button class="btn-manual" onmousedown="startTone()" onmouseup="stopTone()" onmouseleave="stopTone()">—</button>
    </div>
    
    <div class="hint">Ручные кнопки работают со звуком</div>
</div>

<script>
    const dictionary = {
        'А': '.-', 'Б': '-...', 'В': '.--', 'Г': '--.', 'Д': '-..', 'Е': '.', 'Ж': '...-', 
        'З': '--..', 'И': '..', 'Й': '.---', 'К': '-.-', 'Л': '.-..', 'М': '--', 'Н': '-.', 
        'О': '---', 'П': '.--.', 'Р': '.-.', 'С': '...', 'Т': '-', 'У': '..-', 'Ф': '..-.', 
        'Х': '....', 'Ц': '-.-.', 'Ч': '---.', 'Ш': '----', 'Щ': '--.-', 'Ы': '-.--', 
        'Ь': '-..-', 'Э': '..-..', 'Ю': '..--', 'Я': '.-.-', ' ': '/'
    };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = null;
    let gain = null;

    // Параметры времени (в секундах)
    const dotTime = 0.1; 
    const dashTime = dotTime * 3;
    const pauseBetweenSymbols = dotTime;
    const pauseBetweenLetters = dotTime * 3;

    function createOscillator() {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(600, audioCtx.currentTime);
        g.gain.setValueAtTime(0, audioCtx.currentTime);
        o.connect(g);
        g.connect(audioCtx.destination);
        o.start();
        return { o, g };
    }

    // Ручной звук
    function startTone() {
        if (!osc) {
            const nodes = createOscillator();
            osc = nodes.o;
            gain = nodes.g;
        }
        gain.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.01);
    }

    function stopTone() {
        if (gain) {
            gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
            setTimeout(() => {
                if (osc) { osc.stop(); osc = null; gain = null; }
            }, 50);
        }
    }

    function translate() {
        const text = document.getElementById('textInput').value.toUpperCase();
        const code = text.split('').map(c => dictionary[c] || '').join(' ');
        document.getElementById('output').innerText = code;
    }

    // Автопроигрывание всей строки
    async function playFullSequence() {
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        const code = document.getElementById('output').innerText;
        if (!code) return;

        for (let char of code) {
            if (char === '.') {
                await beep(dotTime);
            } else if (char === '-') {
                await beep(dashTime);
            } else if (char === ' ') {
                await sleep(pauseBetweenLetters);
            } else if (char === '/') {
                await sleep(dotTime * 7);
            }
            await sleep(pauseBetweenSymbols);
        }
    }

    function beep(duration) {
        return new Promise(resolve => {
            const { o, g } = createOscillator();
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            setTimeout(() => {
                g.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
                o.stop(audioCtx.currentTime + 0.05);
                resolve();
            }, duration * 1000);
        });
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms * 1000));
    }
</script>

</body>
</html>
